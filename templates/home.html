<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Prediction</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 15px;
    }
    .btn-custom {
      background: #2193b0;
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #176d80;
      color: #fff;
    }
    .result-box {
      border-radius: 10px;
      padding: 15px;
      background: #f8f9fa;
      box-shadow: inset 0px 0px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-lg p-4" style="width: 420px;">
      <h2 class="text-center text-dark mb-4">Purchase Prediction </h2>

      <!-- Form -->
      <form method="POST">
        <div class="mb-3">
          <label for="age" class="form-label">Age</label>
          <input type="number" class="form-control" id="age" name="age" placeholder="Enter age" required>
        </div>

        <div class="mb-3">
          <label for="salary" class="form-label">Estimated Salary</label>
          <input type="number" class="form-control" id="salary" name="salary" placeholder="Enter salary" required>
        </div>

        <button type="submit" class="btn btn-custom w-100">Predict</button>
      </form>

      <!-- Result -->
      {% if prediction %}
      <div class="result-box mt-4">
        <h5 class="text-success">Prediction Result</h5>
        <p><strong>Prediction:</strong> {{ prediction }}</p>
        <div class="progress mb-2">
          <div class="progress-bar bg-danger" role="progressbar" 
               style="width: {{ proba_no }}%;" 
               aria-valuenow="{{ proba_no }}" aria-valuemin="0" aria-valuemax="100">
            No Purchase: {{ proba_no }}%
          </div>
        </div>
        <div class="progress">
          <div class="progress-bar bg-success" role="progressbar" 
               style="width: {{ proba_yes }}%;" 
               aria-valuenow="{{ proba_yes }}" aria-valuemin="0" aria-valuemax="100">
            Purchase: {{ proba_yes }}%
          </div>
        </div>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
